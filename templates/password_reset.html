{% extends "base.html" %}

{% block content %}

<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-6">

            <div class="card shadow p-4">

                <h3 class="mb-3">Forgot Password</h3>

                <form method="POST">
                    {% csrf_token %}
                    {{ form.email.label }}
                    {{ form.email }}

                    <button type="submit" class="btn btn-primary w-100 mt-3">
                        Send Reset Link
                    </button>
                </form>

            </div>

        </div>
    </div>
</div>

{% endblock %}

{% extends "base.html" %}

{% block title %}
Citizen Registration
{% endblock %}

{% block content %}
<style>

:root{
    --primary:#2563eb;
    --primary-dark:#1d4ed8;
    --secondary:#0f172a;
    --background:#f4f7fc;
    --border:#dbe4f0;
    --text:#1e293b;
}

/* Page Background */
body{
    background:linear-gradient(135deg,#eef4ff,#f8fbff);
}

.register-bg{
    min-height:100vh;
    display:flex;
    align-items:center;
    justify-content:center;
    padding:40px 20px;
}

/* Card */
.register-card{
    background:#ffffff;
    border:none;
    border-radius:22px;
    overflow:hidden;
    box-shadow:0 18px 45px rgba(0,0,0,.10);
    transition:.35s;
}

.register-card:hover{
    transform:translateY(-6px);
    box-shadow:0 25px 60px rgba(37,99,235,.18);
}

/* Header */
.register-card .card-header{
    background:linear-gradient(135deg,var(--primary),var(--primary-dark));
    color:#fff;
}

.register-card .display-4{
    font-size:55px;
}

/* Labels */
label{
    font-weight:600;
    color:var(--text);
    margin-bottom:6px;
}

/* Inputs */
.form-control{
    height:50px;
    border-radius:12px;
    border:1px solid var(--border);
    transition:.3s;
    box-shadow:none!important;
    padding:12px 15px;
}

.form-control:focus{
    border-color:var(--primary);
    box-shadow:0 0 0 .2rem rgba(37,99,235,.15)!important;
}

/* Buttons */
.btn-warning{
    background:#f59e0b;
    border:none;
    color:#fff;
    font-weight:600;
    border-radius:12px;
    padding:12px;
}

.btn-warning:hover{
    background:#d97706;
    color:#fff;
}

.btn-outline-light{
    border:2px solid var(--primary);
    color:var(--primary);
    background:#fff;
    border-radius:12px;
    font-weight:600;
}

.btn-outline-light:hover{
    background:var(--primary);
    color:#fff;
}

/* Hover Animation */
.btn-glow{
    transition:.3s;
}

.btn-glow:hover{
    transform:translateY(-2px);
    box-shadow:0 12px 28px rgba(37,99,235,.25);
}

/* Alert */
.alert{
    border:none;
    border-radius:12px;
}

/* Password Error */
#msg{
    font-size:14px;
    font-weight:500;
}

/* Divider */
hr{
    opacity:.15;
}

/* Bottom Text */
.text-center p{
    color:#64748b;
}

/* Mobile */
@media(max-width:768px){

.register-card{
    margin:15px;
}

.register-card .display-4{
    font-size:45px;
}

.card-body{
    padding:25px!important;
}

}

</style>


<div class="register-bg">

<div class="col-lg-6 col-md-8">

    <div class="card register-card shadow-lg border-0">

        <!-- HEADER -->
        <div class="card-header text-center border-0 py-4">

            <div class="display-4">🧑‍💻</div>

            <h3 class="fw-bold mt-2">Create Account</h3>

            <p class="mb-0">
                Secure Citizen Registration Portal
            </p>

        </div>

        <!-- BODY -->
        <div class="card-body p-4">

            {% if error %}
                <div class="alert alert-danger">
                    {{ error }}
                </div>
            {% endif %}

            <form method="POST" id="registerForm">
                {% csrf_token %}

                <!-- Username -->
                <div class="mb-3">
                    <label>Username</label>
                    <input type="text"
                           name="username"
                           class="form-control"
                           placeholder="Enter username"
                           required
                           oninvalid="this.setCustomValidity('Username must start with a letter and contain only letters, numbers, and underscore (_). Length: 4–20 characters.')"
                           oninput="this.setCustomValidity('')">
                </div>

                <!-- Email -->
                <div class="mb-3">
                    <label>Email</label>
                    <input type="email"
                           name="email"
                           class="form-control"
                           placeholder="Enter email"
                           required>
                </div>

                <!-- Password -->
                <div class="mb-3">
                    <label>Password</label>
                    <input type="password"
                           id="password"
                           name="password"
                           class="form-control"
                           placeholder="Create password"
                           required>
                </div>

                <!-- Confirm Password -->
                <div class="mb-2">
                    <label>Confirm Password</label>
                    <input type="password"
                           id="confirm"
                           class="form-control"
                           placeholder="Confirm password"
                           required>
                </div>

                <small id="msg" class="text-danger"></small>

                <!-- BUTTON -->
                <button type="submit"
                        class="btn btn-warning w-100 mt-3 btn-glow">
                    🚀 Register
                </button>

            </form>

            <hr class="text-light">

            <div class="text-center">

                <p>Already have an account?</p>

                <a href="/login/" class="btn btn-outline-light btn-glow">
                    Login
                </a>

            </div>

        </div>

    </div>

</div>

</div>

<script>
document.getElementById("registerForm").addEventListener("submit", function(e){

    let p = document.getElementById("password").value;
    let c = document.getElementById("confirm").value;

    if(p !== c){
        e.preventDefault();
        document.getElementById("msg").innerText = "Passwords do not match!";
    }

});
</script>

{% endblock %}

<!DOCTYPE html>
<html>
<head>
    <title>Assign Police Officer</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

<div class="container mt-5">

    <div class="row justify-content-center">

        <div class="col-md-6">

            <div class="card shadow-lg border-0 rounded-4">

                <div class="card-header bg-primary text-white text-center">
                    <h4 class="mb-0">🚔 Assign Police Officer</h4>
                </div>

                <div class="card-body">

                    <h5 class="text-dark mb-3">
                        📝 Complaint:
                        <span class="text-primary">{{ complaint.title }}</span>
                    </h5>

                    <form method="POST">
                        {% csrf_token %}

                        <div class="mb-3">
                            <label class="form-label fw-bold">Select Police Officer</label>

                            <select name="officer_id" class="form-select" required>
                                <option value="">-- Choose Officer --</option>

                                {% for officer in police_users %}
                                    <option value="{{ officer.id }}">
                                        {{ officer.username }}
                                    </option>
                                {% endfor %}

                            </select>
                        </div>

                        <div class="d-grid gap-2">
                            <button type="submit" class="btn btn-success">
                                ✅ Assign Officer
                            </button>

                            <a href="{% url 'admin_dashboard' %}" class="btn btn-outline-secondary">
                                ⬅ Back
                            </a>
                        </div>

                    </form>

                </div>

            </div>

        </div>

    </div>

</div>

</body>
</html>
